<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monika Makeovers – Quotation Builder</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
</head>
<body>

<div class="app">

  <!-- ═══════════════════════════════════════
       SIDEBAR – builder controls
  ════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <div class="s-brand">
      <img src="logo.png" alt="Monika Makeovers" class="s-logo" />
      <div>
        <div class="s-brand-name">Monika Makeovers</div>
        <div class="s-brand-sub">Quotation Builder</div>
      </div>
    </div>

    <div class="s-section-head">Client Details</div>

    <div class="field">
      <label class="lbl" for="cName">Client Name</label>
      <input type="text" id="cName" placeholder="e.g. Priya Sharma" />
    </div>

    <div class="field">
      <label class="lbl" for="cPhone">Phone / WhatsApp</label>
      <input type="text" id="cPhone" placeholder="+91 98765 43210" />
    </div>

    <div class="field">
      <label class="lbl" for="cNote">Note for Client</label>
      <textarea id="cNote" rows="2" placeholder="Conveyance extra, advance, terms..."></textarea>
    </div>

    <div class="s-section-head" style="margin-top:8px">Notes / Things to Consider</div>

    <div id="notesList"></div>
    <button class="add-note-btn" onclick="addNote()">+ Add Note</button>

    <div class="s-section-head" style="margin-top:8px">Dates &amp; Events</div>
    <div id="datesList"></div>
    <button class="add-date-btn" onclick="addDate()">+ Add Date</button>

    <button class="gen-btn" onclick="generate()">✦ Generate Quotation</button>

  </aside>

  <!-- ═══════════════════════════════════════
       PREVIEW – receipt output
  ════════════════════════════════════════ -->
  <main class="preview" id="previewArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💄</div>
      <p>Add dates &amp; events on the left,<br />then click <em>Generate Quotation</em></p>
    </div>
  </main>

</div>

<script src="data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
